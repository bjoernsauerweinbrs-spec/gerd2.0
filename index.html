<!doctype html>
<html lang="de" translate="no" class="notranslate">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GERD 2.0 | Pro-Engine & Persistence (Phase 9)</title>
  <meta name="google" content="notranslate" />

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: "#001240",
            redbull: "var(--color-redbull, #E21B4D)",
            neon: "var(--color-neon, #00f3ff)",
            gold: "#d4af37",
            "schalke-blau": "#004B91",
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"],
            mono: ["JetBrains Mono", "monospace"],
          },
        },
      },
    };
  </script>

  <!-- A-Frame & Extras -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.2/dist/aframe-extras.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <!-- Editorial Engine Dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:ital,wght@0,400;0,700;1,700&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --color-neon: #00f3ff;
      --color-redbull: #e21b4d;
      --color-gold: #d4af37;
      --transition-speed: 0.15s;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      color: #ffffff;
      font-family: "Inter", sans-serif;
      overflow-x: hidden;
      background-image:
        radial-gradient(circle at 50% 50%,
          rgba(226, 27, 77, 0.05) 0%,
          transparent 70%),
        linear-gradient(rgba(0, 0, 0, 0.98), rgba(0, 0, 0, 0.98)),
        url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
      background-size: 20px 20px;
    }

    /* Neural Particle Canvas */
    #neural-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.6;
    }

    .glass-panel {
      background: rgba(0, 5, 20, 0.6);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
      transition: all var(--transition-speed) cubic-bezier(0.19, 1, 0.22, 1);
    }

    .glass-panel:hover {
      border-color: rgba(0, 243, 255, 0.5);
      box-shadow:
        0 12px 48px rgba(0, 243, 255, 0.15),
        inset 0 0 30px rgba(0, 243, 255, 0.1);
    }

    .gold-panel {
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(212, 175, 55, 0.6);
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.2);
      border-radius: 16px;
    }

    .text-glow-neon {
      text-shadow:
        0 0 15px rgba(0, 243, 255, 0.9),
        0 0 30px rgba(0, 243, 255, 0.4);
    }

    /* AI Pulse Animation */
    @keyframes aiPulse {
      0% {
        filter: brightness(1) drop-shadow(0 0 0px rgba(0, 243, 255, 0));
      }

      50% {
        filter: brightness(1.3) drop-shadow(0_0_20px_rgba (0, 243, 255, 0.6));
      }

      100% {
        filter: brightness(1) drop-shadow(0 0 0px rgba(0, 243, 255, 0));
      }
    }

    .ai-pulse-active {
      animation: aiPulse 2s infinite ease-in-out;
    }

    /* Shimmer Effect for Cards */
    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .shimmer-bg {
      background: linear-gradient(90deg,
          transparent,
          rgba(0, 243, 255, 0.05),
          transparent);
      background-size: 200% 100%;
      animation: shimmer 3s infinite linear;
    }

    .text-glow-red {
      text-shadow: 0 0 12px rgba(226, 27, 77, 0.9), 0 0 24px rgba(226, 27, 77, 0.4);
    }

    /* Power Pulse Animation */
    @keyframes powerPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(226, 27, 77, 0.7);
      }

      70% {
        box-shadow: 0 0 0 15px rgba(226, 27, 77, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(226, 27, 77, 0);
      }
    }

    .power-pulse {
      animation: powerPulse 1.5s infinite;
    }

    /* Champions Mode Global Intensity (Phase 13) */
    .champions-mode-active .glass-panel {
      border-color: rgba(226, 27, 77, 0.3);
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.9), 0 0 20px rgba(226, 27, 77, 0.05);
    }

    .champions-mode-active .energy-glow-red {
      box-shadow: 0 0 40px rgba(226, 27, 77, 0.6);
      filter: contrast(1.1) brightness(1.1);
    }

    .champions-mode-active h1,
    .champions-mode-active h2 {
      letter-spacing: -0.05em;
      filter: drop-shadow(0 0 8px rgba(226, 27, 77, 0.3));
    }

    @keyframes extremeGlow {
      0% {
        box-shadow: 0 0 5px rgba(226, 27, 77, 0.4);
      }

      50% {
        box-shadow: 0 0 25px rgba(226, 27, 77, 0.8);
      }

      100% {
        box-shadow: 0 0 5px rgba(226, 27, 77, 0.4);
      }
    }

    .champions-mode-active .ai-pulse-active {
      animation: extremeGlow 1s infinite alternate ease-in-out;
    }

    /* Energy Glow */
    .energy-glow-red {
      box-shadow: 0 0 30px rgba(226, 27, 77, 0.4);
      border-color: rgba(226, 27, 77, 0.6) !important;
    }

    .energy-glow-neon {
      box-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
      border-color: rgba(0, 243, 255, 0.6) !important;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 18, 64, 0.2);
    }

    ::-webkit-scrollbar-thumb {
      background: #e21b4d;
      border-radius: 4px;
    }

    /* Medical Lab Animations */
    @keyframes heartPulse {
      0% {
        transform: scale(1);
        filter: drop-shadow(0 0 5px rgba(226, 27, 77, 0.4));
      }

      50% {
        transform: scale(1.15);
        filter: drop-shadow(0 0 15px rgba(226, 27, 77, 0.8));
      }

      100% {
        transform: scale(1);
        filter: drop-shadow(0 0 5px rgba(226, 27, 77, 0.4));
      }
    }

    .heart-pulsing {
      animation: heartPulse var(--pulse-speed, 1s) infinite ease-in-out;
    }

    @keyframes ekgMove {
      0% {
        stroke-dashoffset: 100;
        opacity: 0.1;
      }

      50% {
        opacity: 0.4;
      }

      100% {
        stroke-dashoffset: 0;
        opacity: 0.1;
      }
    }

    .ekg-line {
      stroke-dasharray: 100;
      animation: ekgMove 3s infinite linear;
    }

    /* Video Hub & Telestrator */
    .video-container-3d {
      transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      perspective: 1000px;
      transform-style: preserve-3d;
    }

    .video-container-3d.active-3d {
      transform: perspective(1000px) rotateX(45deg) scale(1.1) translateY(-50px);
      box-shadow: 0 50px 100px rgba(0, 243, 255, 0.3);
    }

    .telestrator-canvas {
      cursor: crosshair;
      touch-action: none;
    }

    .tool-btn-active {
      background: #00f3ff;
      color: #001240;
      box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
    }

    @keyframes slideInUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .animate-slide-up {
      animation: slideInUp 0.5s ease-out forwards;
    }

    .carbon-fiber {
      background:
        linear-gradient(27deg, #151515 5px, transparent 5px) 0 5px,
        linear-gradient(207deg, #151515 5px, transparent 5px) 10px 0px,
        linear-gradient(27deg, #222 5px, transparent 5px) 0px 10px,
        linear-gradient(207deg, #222 5px, transparent 5px) 10px 5px,
        linear-gradient(90deg, #1b1b1b 10px, transparent 10px),
        linear-gradient(#1d1d1d 25%,
          #1a1a1a 25%,
          #1a1a1a 50%,
          transparent 50%,
          transparent 75%,
          #242424 75%,
          #242424);
      background-color: #131313;
      background-size: 20px 20px;
    }

    /* Responsive Mobile Styles */
    @media (max-width: 768px) {
      .mobile-bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100vw;
        background: rgba(5, 10, 20, 0.98);
        border-top: 1px solid rgba(0, 243, 255, 0.3);
        z-index: 500;
        padding: 12px 0 20px 0;
        justify-content: space-around;
        backdrop-filter: blur(20px);
        box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.9);
      }

      .main-content-mobile {
        padding-bottom: 120px !important;
        padding-left: 15px !important;
        padding-right: 15px !important;
      }

      .tactic-board-mobile {
        width: 100vw !important;
        margin-left: -15px !important;
        margin-right: -15px !important;
        border-radius: 0 !important;
        touch-action: none;
      }

      .kader-leiste-mobile {
        display: flex !important;
        flex-direction: row !important;
        overflow-x: auto !important;
        width: 100vw !important;
        margin-left: -15px !important;
        padding: 10px 15px 25px 15px !important;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        grid-template-columns: none !important;
        /* Override grid if present */
        gap: 0 !important;
      }

      .kader-leiste-mobile::-webkit-scrollbar {
        height: 4px;
      }

      .kader-leiste-mobile::-webkit-scrollbar-thumb {
        background: rgba(0, 243, 255, 0.3);
        border-radius: 2px;
      }

      .kader-item-mobile {
        min-width: 130px !important;
        max-width: 130px !important;
        scroll-snap-align: center;
        margin-right: 15px;
        flex-shrink: 0;
      }

      .dossier-slider-mobile::-webkit-slider-thumb {
        width: 32px !important;
        height: 32px !important;
        background: #00f3ff !important;
        box-shadow: 0 0 15px rgba(0, 243, 255, 0.6) !important;
      }

      .desktop-only {
        display: none !important;
      }

      .mobile-only {
        display: block !important;
      }

      h2,
      h3 {
        font-size: 1.5rem !important;
      }

      .text-5xl {
        font-size: 2rem !important;
      }
    }

    @media (min-width: 769px) {
      .mobile-only {
        display: none !important;
      }
    }

    /* Luxury Additions */
    .glass-panel-heavy {
      background: rgba(0, 8, 20, 0.85);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
    }

    .premium-glow {
      box-shadow: 0 0 30px rgba(0, 243, 255, 0.1), inset 0 0 20px rgba(0, 243, 255, 0.05);
    }

    .animate-shimmer-slow {
      background: linear-gradient(90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.03) 50%,
          rgba(255, 255, 255, 0) 100%);
      background-size: 200% 100%;
      animation: shimmer 8s infinite linear;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.98);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .animate-luxury-in {
      animation: fadeInScale 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" src="react-code-v2.jsx?v=12"></script>
</body>

</html>
